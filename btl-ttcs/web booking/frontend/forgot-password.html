<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quên mật khẩu - Nhà xe Tiến Sơn</title>
    <link rel="stylesheet" href="css/auth.css">
    
    <link rel="stylesheet" href="css/forgot-password.css">
</head>
<body>

    <div class="auth-wrapper" style="max-width: 500px;">
        <h2>Thay đổi mật khẩu</h2>
        <p class="subtitle" id="stepSubtitle">Vui lòng điền tên đăng nhập của bạn</p>

        <div id="step1" class="step active">
            <div class="input-group">
                <input type="text" id="usernameReset" placeholder="Tên đăng nhập" required>
            </div>
            
            <button type="button" class="btn-submit" onclick="nextStep()">TIẾP THEO</button>
            
            <div class="auth-links">
                <p style="margin-top: 25px;"><a href="login.html" style="text-decoration: none;">← Quay lại Đăng nhập</a></p>
            </div>
        </div>

        <div id="step2" class="step">
            
            <div class="progress-tracker">
                <span id="tab-email" class="active">Nhập Email</span>
                <span id="tab-otp">Nhập OTP</span>
                <span id="tab-pass">Nhập mật khẩu mới</span>
            </div>

            <div id="sub-step-email" class="sub-step active">
                <div class="input-group">
                    <input type="email" id="emailVerify" placeholder="Nhập Email của bạn" required>
                </div>
                <button type="button" class="btn-submit" id="btnSubmitEmail" onclick="verifyEmail()">TIẾP THEO</button>
            </div>

            <div id="sub-step-otp" class="sub-step">
                <p style="font-size: 13px; margin-bottom: 15px;">Mã OTP đã được gửi. Vui lòng kiểm tra hộp thư.</p>
                <div class="input-group otp-group">
                    <input type="text" id="otpCode" placeholder="Nhập mã OTP (6 số)" required>
                    <button type="button" class="btn-otp" id="btnSendOtp" onclick="resendOTP()">Gửi lại</button>
                </div>
                <button type="button" class="btn-submit" onclick="goToPasswordStep()">TIẾP THEO</button>
            </div>

            <div id="sub-step-pass" class="sub-step">
                <div class="input-group">
                    <input type="password" id="newPassword" placeholder="Nhập Mật khẩu mới" required>
                </div>
                <button type="button" class="btn-submit" onclick="changePassword()">HOÀN TẤT</button>
            </div>

            <button type="button" class="btn-submit btn-secondary" onclick="prevStep()">HỦY & QUAY LẠI</button>
        </div>

    </div>

    <script src="js/forgot-password.js"></script>
</body>
</html>
</body>
</html>
